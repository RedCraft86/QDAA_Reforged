modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
clientSideOnly=true

[[mixins]]
    config="${mod_id}.mixins.json"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    authors="${mod_author}"
    credits="${mod_credits}"
    description='''${mod_description}'''
    displayURL="https://github.com/${mod_author}/${repo_name}"
    issueTrackerURL="https://github.com/${mod_author}/${repo_name}/issues"
    logoFile="${mod_id}_icon.png"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[modproperties.${mod_id}]
    catalogueImageIcon="${mod_id}_icon.png"